name: Docker Build and Push
description: Build and push Docker image to a container registry using Buildx

inputs:
  image-name:
    description: Full image name (e.g. ghcr.io/owner/app)
    required: true
  dockerfile:
    description: Path to Dockerfile
    required: false
    default: "./Dockerfile"
  context:
    description: Docker build context
    required: false
    default: "."
  platforms:
    description: Target platforms for multi-arch builds
    required: false
    default: "linux/amd64,linux/arm64"
  build-target:
    description: Docker build target stage (leave empty to build all stages)
    required: false
    default: ""
  push:
    description: Whether to push the image
    required: false
    default: "true"
  tags:
    description: "Tag rules for docker/metadata-action (multi-line)"
    required: true
  registry:
    description: Container registry URL
    required: false
    default: "ghcr.io"
  registry-username:
    description: Registry login username (defaults to github.actor)
    required: false
    default: ""
  registry-password:
    description: Registry login password (e.g. secrets.GITHUB_TOKEN)
    required: true
  cache-type:
    description: Docker build cache type
    required: false
    default: "gha"
  build-args:
    description: Docker build arguments (multi-line)
    required: false
    default: ""

outputs:
  digest:
    description: Image digest
    value: ${{ steps.build.outputs.digest }}
  tags:
    description: Generated image tags
    value: ${{ steps.meta.outputs.tags }}
  metadata:
    description: Full Docker metadata JSON
    value: ${{ steps.meta.outputs.json }}

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to registry
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry-username || github.actor }}
        password: ${{ inputs.registry-password }}

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ inputs.image-name }}
        tags: ${{ inputs.tags }}

    - name: Build and push
      id: build
      uses: docker/build-push-action@v7
      env:
        DOCKER_BUILD_SUMMARY: false
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        target: ${{ inputs.build-target || '' }}
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=${{ inputs.cache-type }}
        cache-to: type=${{ inputs.cache-type }},mode=max

    - name: Write job summary
      if: inputs.push == 'true'
      shell: bash
      run: |
        {
          echo "### Docker Image"
          echo ""
          echo "| Tag | Pull command |"
          echo "|-----|-------------|"
          while IFS= read -r tag; do
            [ -z "${tag}" ] && continue
            name="${tag##*:}"
            echo "| \`${name}\` | \`docker pull ${tag}\` |"
          done <<< "${{ steps.meta.outputs.tags }}"
        } >> "$GITHUB_STEP_SUMMARY"
