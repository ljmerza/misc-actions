name: Frontend Test
description: Run frontend tests via npm and optionally upload coverage to Codecov

inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: "20"
  working-directory:
    description: Frontend directory
    required: true
  test-command:
    description: Test command to run
    required: false
    default: "npm test"
  codecov-token:
    description: Codecov upload token (skip upload if empty)
    required: false
    default: ""
  codecov-flags:
    description: Codecov flags for this upload
    required: false
    default: "frontend"
  coverage-file:
    description: Coverage output path relative to working directory
    required: false
    default: "coverage/coverage-final.json"

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci

    - name: Run tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.test-command }}

    - name: Upload coverage to Codecov
      if: always() && inputs.codecov-token != ''
      uses: codecov/codecov-action@v4
      with:
        files: ${{ inputs.working-directory }}/${{ inputs.coverage-file }}
        flags: ${{ inputs.codecov-flags }}
        token: ${{ inputs.codecov-token }}
        fail_ci_if_error: false
