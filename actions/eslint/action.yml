name: ESLint
description: Run ESLint via npm for frontend projects

inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: "20"
  working-directory:
    description: Frontend directory to lint
    required: true

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci

    - name: Run ESLint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm run lint
