name: Python Test
description: Run pytest with coverage via uv and optionally upload to Codecov

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.12"
  working-directory:
    description: Project root directory
    required: false
    default: "."
  coverage-source:
    description: Comma-separated packages for --cov (e.g. "backup" or "alarm,accounts,locks")
    required: true
  codecov-token:
    description: Codecov upload token (skip upload if empty)
    required: false
    default: ""
  codecov-flags:
    description: Codecov flags for this upload (e.g. "backend")
    required: false
    default: ""
  uv-install-args:
    description: Arguments for uv sync (e.g. --all-extras or --group dev)
    required: false
    default: "--all-extras"
  env-vars:
    description: "Newline-separated KEY=VALUE environment variables for tests"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Set up Python
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: uv sync --frozen ${{ inputs.uv-install-args }}

    - name: Run tests with coverage
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Export user-provided environment variables
        if [ -n "$ENV_VARS" ]; then
          while IFS= read -r line; do
            line=$(echo "$line" | xargs)
            [[ -z "$line" || "$line" == \#* ]] && continue
            export "$line"
          done <<< "$ENV_VARS"
        fi

        # Build --cov flags from comma-separated source list
        COV_FLAGS=""
        IFS=',' read -ra SOURCES <<< "${{ inputs.coverage-source }}"
        for src in "${SOURCES[@]}"; do
          src=$(echo "$src" | xargs)
          COV_FLAGS="$COV_FLAGS --cov=$src"
        done

        uv run pytest $COV_FLAGS --cov-report=xml --cov-report=term-missing
      env:
        ENV_VARS: ${{ inputs.env-vars }}

    - name: Upload coverage to Codecov
      if: always() && inputs.codecov-token != ''
      uses: codecov/codecov-action@v4
      with:
        files: ${{ inputs.working-directory }}/coverage.xml
        flags: ${{ inputs.codecov-flags }}
        token: ${{ inputs.codecov-token }}
        fail_ci_if_error: false
