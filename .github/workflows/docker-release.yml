name: Docker Release

on:
  workflow_call:
    inputs:
      image-name:
        description: "Full image name (e.g. ghcr.io/owner/app)"
        required: true
        type: string
      build-target:
        description: Docker build target stage (leave empty to build all stages)
        type: string
        default: ""
      build-args:
        description: Docker build arguments (multi-line)
        type: string
        default: ""

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ljmerza/misc-actions/actions/docker-build-push@v1
        id: build
        with:
          image-name: ${{ inputs.image-name }}
          build-target: ${{ inputs.build-target }}
          build-args: ${{ inputs.build-args }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - uses: ljmerza/misc-actions/actions/provenance-attest@v1
        with:
          image-name: ${{ inputs.image-name }}
          digest: ${{ steps.build.outputs.digest }}
